version: '3.9'
services:
    postgres:
        image: postgres:16
        environment:
            POSTGRES_DB: ${PG_DB}
            POSTGRES_USER: ${PG_USER}
            POSTGRES_PASSWORD: ${PG_PASSWORD}
        ports:
            - '5432:5432'
        volumes:
            - postgres-data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${PG_USER} -d ${PG_DB}']
            interval: 5s
            timeout: 5s
            retries: 5

    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        ports:
            - '8000:8000'
        environment:
            PG_DB: ${PG_DB}
            PG_USER: ${PG_USER}
            PG_PASSWORD: ${PG_PASSWORD}
            PG_PORT: 5432
            PG_DOMAIN: postgres
            DB_URL: postgresql://${PG_USER}:${PG_PASSWORD}@postgres:5432/${PG_DB}
            DATABASE_URL: postgresql://${PG_USER}:${PG_PASSWORD}@postgres:5432/${PG_DB}
        depends_on:
            postgres:
                condition: service_healthy
        volumes:
            - ./backend/uploads:/app/backend/uploads

    frontend:
        environment:
            VITE_API_URL: http://localhost:8000/api
        build:
            context: ./frontend
            dockerfile: Dockerfile
        ports:
            - '5173:5173'
        depends_on:
            - backend
        volumes:
            - ./frontend:/app
            - /app/node_modules

    seed:
        build:
            context: ./backend
            dockerfile: Dockerfile
        command: python seed.py
        environment:
            PG_DB: ${PG_DB}
            PG_USER: ${PG_USER}
            PG_PASSWORD: ${PG_PASSWORD}
            PG_PORT: 5432
            PG_DOMAIN: postgres
            DB_URL: postgresql://${PG_USER}:${PG_PASSWORD}@postgres:5432/${PG_DB}
        depends_on:
            postgres:
                condition: service_healthy
            backend:
                condition: service_started
        profiles:
            - seed

volumes:
    postgres-data:
